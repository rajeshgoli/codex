name: sm-fork-baseline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  rust-core:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libcap-dev
      - name: Build bridge-critical crates
        run: cargo build -p codex-core -p codex-protocol --locked
      - name: Test bridge protocol contract crate
        run: cargo test -p codex-protocol --locked
